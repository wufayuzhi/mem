version: "3.8"

services:
  mem:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ntn-mem
    ports:
      - "8081:8081"
    volumes:
      - ./data:/data               # SQLite 持久化
      - ./src:/opt/ntn-mem/src     # 开发模式热重载
    environment:
      - NTN_MEM_HOST=0.0.0.0
      - NTN_MEM_PORT=8081
      - NTN_MEM_DB=/data/mem.db
      - NTN_MEM_PROVIDER=${NTN_MEM_PROVIDER:-openai}
      - NTN_QDRANT_URL=${NTN_QDRANT_URL:-http://qdrant:6333}
      - OPENAI_BASE_URL=${OPENAI_BASE_URL:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - NTN_MEM_EMBED_MODEL=${NTN_MEM_EMBED_MODEL:-BAAI/bge-m3}
      - NTN_MEM_LLM_MODEL=${NTN_MEM_LLM_MODEL:-}
    env_file:
      - .env
    restart: unless-stopped

  # 可选：内嵌 Qdrant
  qdrant:
    image: qdrant/qdrant:latest
    container_name: ntn-mem-qdrant
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage
    restart: unless-stopped

volumes:
  qdrant_data:
